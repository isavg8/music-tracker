<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music Tracker">
<title>🎸 Music Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --surface: #161618;
  --surface2: #1e1e22;
  --surface3: #252529;
  --border: #2a2a30;
  --border2: #35353d;
  --accent: #a855f7;
  --accent-dim: #7c3aed;
  --green: #b57bee;
  --blue: #9333ea;
  --red: #ff6b6b;
  --gold: #ffd700;
  --text: #f0f0f0;
  --text-muted: #6b6b78;
  --text-dim: #9999a8;
  --row-hover: #1a1a20;
  --check1-bg: #1e1228;
  --check1-border: #7c3aed;
  --check2-bg: #160d24;
  --check2-border: #9333ea;
  --modal-bg: rgba(0,0,0,0.85);
}
.light {
  --bg: #f2f2ee;
  --surface: #ffffff;
  --surface2: #ebebeb;
  --surface3: #e0e0dc;
  --border: #d5d5cc;
  --border2: #c0c0b8;
  --text: #111111;
  --text-muted: #999999;
  --text-dim: #666666;
  --row-hover: #e8e8e4;
  --check1-bg: #f3e8ff;
  --check1-border: #9333ea;
  --check2-bg: #ede9fe;
  --check2-border: #7c3aed;
  --modal-bg: rgba(0,0,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

/* HEADER */
.header {
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 14px 0;
  position: relative;
  z-index: 50;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.4;transform:scale(0.7)}
}
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all 0.15s;
}
.icon-btn:active { transform: scale(0.9); }

.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.search-box {
  position: relative;
  flex: 1;
}
.search-box input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 12px 9px 36px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px;
  pointer-events: none;
}
.add-btn {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 0 14px;
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.add-btn:active { transform: scale(0.93); }

.filter-tabs {
  display: flex;
  gap: 5px;
  padding-bottom: 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 5px 12px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}

/* STATS */
.stats-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-value {
  font-family: 'Space Mono', monospace;
  font-size: 17px;
  font-weight: 700;
  line-height: 1;
}
.stat-label { font-size: 10px; color: var(--text-dim); }
.stat-value.acc { color: var(--accent); }
.stat-value.bl { color: #a855f7; }
.progress-bar {
  flex: 1; height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 12px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #a855f7);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* LIST */
.list-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 80px;
}
.section-letter {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  padding: 10px 14px 3px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.band-row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  transition: background 0.1s;
}
.band-row.listened1 { background: var(--check1-bg); }
.band-row.listened2 { background: var(--check2-bg); opacity: 0.75; }
.band-info {
  flex: 1;
  min-width: 0;
  cursor: pointer;
}
.band-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.2s;
}
.band-row.listened1 .band-name { color: #c084fc; }
.band-row.listened2 .band-name { color: #9333ea; font-style: italic; }
.band-album {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.band-stars {
  font-size: 10px;
  margin-top: 1px;
  color: var(--gold);
  letter-spacing: 1px;
}
.checks { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
.check-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.check-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.check-btn.c1 { border-color: #7c3aed; background: #1e1228; color: #c084fc; }
.check-btn.c2 { border-color: #9333ea; background: #160d24; color: #a855f7; }
.check-label { font-size: 9px; font-family: 'Space Mono', monospace; color: var(--text-muted); }

.delete-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
}
.delete-btn:active { background: #ff4444; color: white; border-color: #ff4444; }

.empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; gap: 10px;
  color: var(--text-muted);
}
.empty-icon { font-size: 36px; }
.empty-text { font-size: 14px; text-align: center; }

/* ALPHA NAV */
.alpha-nav {
  position: fixed;
  right: 3px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column;
  gap: 0; z-index: 40;
}
.alpha-btn {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 1px 3px;
  border-radius: 3px;
  line-height: 1.5;
  transition: all 0.1s;
}
.alpha-btn:active { background: var(--accent); color: #fff; }

/* FLOATING */
.floating-count {
  position: fixed;
  bottom: 18px; right: 14px;
  background: var(--accent);
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 7px 13px;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 200;
  pointer-events: none;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 55px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 9px 18px;
  border-radius: 18px;
  font-size: 12px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 500;
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: var(--modal-bg);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  width: 100%;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 0 0 30px;
  max-height: 92vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform 0.3s cubic-bezier(.32,1.1,.72,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}
.modal-close {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.modal-body { padding: 16px 18px; }
.field-group { margin-bottom: 14px; }
.field-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
  display: block;
}
.field-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  resize: none;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--text-muted); }
textarea.field-input { min-height: 70px; }

.section-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 12px;
}
.divider-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  white-space: nowrap;
}
.divider-line {
  flex: 1; height: 1px;
  background: var(--border);
}

/* STAR RATING */
.star-rating {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}
.star {
  font-size: 26px;
  cursor: pointer;
  transition: transform 0.1s;
  filter: grayscale(1) opacity(0.3);
  user-select: none;
}
.star.active { filter: none; }
.star:active { transform: scale(1.3); }

.save-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 18px;
  transition: all 0.15s;
}
.save-btn:active { transform: scale(0.97); }

/* ADD MODAL */
.add-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--accent);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--text);
  outline: none;
}
.add-input::placeholder { color: var(--text-muted); }

/* ALBUM ART */
.album-art-wrap {
  width: 100%;
  margin-bottom: 14px;
  border-radius: 14px;
  overflow: hidden;
  background: var(--surface2);
  border: 1px solid var(--border);
  position: relative;
  max-height: 220px;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.album-art-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 13px;
}
.album-art-placeholder { font-size: 52px; opacity: 0.3; }
.album-art-loading {
  font-size: 13px; color: var(--text-muted);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-top-color: #a855f7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-art-btn {
  margin-top: 6px; width: 100%;
  padding: 8px; border-radius: 9px;
  border: 1px solid var(--border2);
  background: var(--surface3); color: var(--text-dim);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.fetch-art-btn:active { background: #a855f722; border-color: #a855f7; color: #a855f7; }

/* IO MODAL */
.io-btn {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.io-btn:active { transform: scale(0.97); }
.io-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}
.io-btn-icon { font-size: 18px; }
.io-note {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 4px;
  line-height: 1.5;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo"><div class="logo-dot"></div>MUSIC TRACKER</div>
    <div class="header-actions">
      <button class="icon-btn" id="ioBtn" title="Importar/Exportar">💾</button>
      <button class="icon-btn" id="themeBtn" title="Tema">🌙</button>
    </div>
  </div>
  <div class="search-row">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar banda..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="add-btn" id="addBandBtn">+</button>
  </div>
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">Todas</button>
    <button class="tab" data-filter="pending">Por escuchar</button>
    <button class="tab" data-filter="first">1ª escucha ✓</button>
    <button class="tab" data-filter="second">2ª escucha ✓</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">
    <span class="stat-value" id="totalCount">0</span>
    <span class="stat-label">total</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="stat">
    <span class="stat-value acc" id="firstCount">0</span>
    <span class="stat-label">1ª esc.</span>
  </div>
  <div class="stat" style="margin-left:10px">
    <span class="stat-value bl" id="secondCount">0</span>
    <span class="stat-label">2ª esc.</span>
  </div>
</div>

<!-- LIST -->
<div class="list-scroll" id="listScroll">
  <div id="listContainer"></div>
</div>

<div class="alpha-nav" id="alphNav"></div>
<div class="floating-count" id="floatingCount">0 bandas</div>
<div class="toast" id="toast"></div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">BANDA</span>
      <button class="modal-close" id="detailClose">✕</button>
    </div>
    <div class="modal-body">
      <div id="albumArtWrap" class="album-art-wrap">
        <div class="album-art-placeholder">🎵</div>
      </div>
      <!-- Art action buttons -->
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="fetch-art-btn" id="searchArtBtn" style="margin-top:0;flex:1;padding:10px 8px;">
          🔍 Buscar portada automáticamente
        </button>
        <label class="fetch-art-btn" id="uploadArtLabel" style="margin-top:0;flex:1;padding:10px 8px;cursor:pointer;text-align:center;">
          📁 Subir imagen
          <input type="file" id="uploadArtInput" accept="image/*" style="display:none">
        </label>
      </div>

      <div class="field-group">
        <label class="field-label">📀 Álbum escuchado</label>
        <input type="text" class="field-input" id="detailAlbum" placeholder="Nombre del álbum...">
      </div>
      <div class="field-group">
        <label class="field-label">🔗 Link del álbum</label>
        <input type="url" class="field-input" id="detailLink" placeholder="https://open.spotify.com/...">
      </div>

      <div class="section-divider">
        <span class="divider-label">1ª ESCUCHA</span>
        <div class="divider-line"></div>
      </div>
      <div class="field-group">
        <label class="field-label">⭐ Rating</label>
        <div class="star-rating" id="stars1">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">💬 Opinión</label>
        <textarea class="field-input" id="detailOpinion1" placeholder="¿Qué te pareció en la primera escucha?"></textarea>
      </div>

      <div class="section-divider">
        <span class="divider-label">2ª ESCUCHA</span>
        <div class="divider-line"></div>
      </div>
      <div class="field-group">
        <label class="field-label">⭐ Rating</label>
        <div class="star-rating" id="stars2">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">💬 Opinión</label>
        <textarea class="field-input" id="detailOpinion2" placeholder="¿Cambió tu opinión en la segunda escucha?"></textarea>
      </div>

      <button class="save-btn" id="detailSave">GUARDAR</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">AGREGAR BANDA</span>
      <button class="modal-close" id="addClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">🎸 Nombre de la banda o músico</label>
        <input type="text" class="add-input" id="addInput" placeholder="Ej: Opeth, Kendrick Lamar...">
      </div>

const STORAGE_KEY = 'music_tracker_v2';
let bands = [];
let state = {};
let currentFilter = 'all';
let searchQuery = '';
let isDark = true;
let currentBand = null;
let rating1 = 0, rating2 = 0;

function normSort(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/^ñ/,'n~').replace(/ñ/g,'n~');
}

function sortBands(arr) {
  return [...arr].sort((a,b) => normSort(a).localeCompare(normSort(b), 'es'));
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      bands = d.bands || [...DEFAULT_BANDS];
      state = d.state || {};
    } else {
      bands = [...DEFAULT_BANDS];
      state = {};
    }
  } catch(e) {
    bands = [...DEFAULT_BANDS];
    state = {};
  }
  bands = sortBands([...new Set(bands)]);
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ bands, state }));
  } catch(e) {}
}

function getStatus(band) {
  const s = state[band];
  if (!s) return 'pending';
  if (s.second) return 'second';
  if (s.first) return 'first';
  return 'pending';
}

function toggle(band, which) {
  if (!state[band]) state[band] = {};
  if (which === 'first') {
    state[band].first = !state[band].first;
    if (!state[band].first) state[band].second = false;
  } else {
    state[band].second = !state[band].second;
    if (state[band].second) state[band].first = true;
  }
  saveData();
  updateStats();
  renderList();
  showToast(which === 'first'
    ? (state[band].first ? `✅ 1ª escucha — ${band}` : `↩ Desmarcado — ${band}`)
    : (state[band].second ? `🎵 2ª escucha — ${band}` : `↩ Desmarcado — ${band}`)
  );
}

function deleteBand(band) {
  if (!confirm(`¿Eliminar "${band}" de la lista?`)) return;
  bands = bands.filter(b => b !== band);
  delete state[band];
  saveData();
  updateStats();
  renderList();
  showToast(`🗑 Eliminado: ${band}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function getFiltered() {
  let list = bands;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(b => b.toLowerCase().includes(q));
  }
  if (currentFilter === 'pending') list = list.filter(b => getStatus(b) === 'pending');
  else if (currentFilter === 'first') list = list.filter(b => getStatus(b) === 'first');
  else if (currentFilter === 'second') list = list.filter(b => getStatus(b) === 'second');
  return list;
}

function getFirstChar(band) {
  const c = band[0];
  if (/[0-9]/.test(c)) return '#';
  const n = c.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (n.toLowerCase() === 'n' && band[0].toLowerCase() === 'ñ') return 'Ñ';
  return n.toUpperCase();
}

function starsHTML(rating) {
  if (!rating) return '';
  return '★'.repeat(rating) + '☆'.repeat(5 - rating);
}

function updateStats() {
  const total = bands.length;
  const f = bands.filter(b => state[b]?.first).length;
  const s = bands.filter(b => state[b]?.second).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('firstCount').textContent = f;
  document.getElementById('secondCount').textContent = s;
  document.getElementById('progressFill').style.width = (total ? f/total*100 : 0) + '%';
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('floatingCount').textContent = filtered.length + ' bandas';
  const container = document.getElementById('listContainer');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎸</div><div class="empty-text">No se encontraron bandas</div></div>`;
    renderAlphaNav([]);
    return;
  }
  let html = '', lastLetter = '';
  filtered.forEach(band => {
    const letter = getFirstChar(band);
    if (letter !== lastLetter) {
      html += `<div class="section-letter" id="letter-${letter}">${letter}</div>`;
      lastLetter = letter;
    }
    const s = state[band] || {};
    const status = getStatus(band);
    const rowClass = status === 'first' ? 'listened1' : status === 'second' ? 'listened2' : '';
    const album = s.album ? `<div class="band-album">💿 ${s.album}</div>` : '';
    const r1 = s.rating1 ? `<div class="band-stars">${starsHTML(s.rating1)}</div>` : '';
    const artThumb = s.artUrl ? `<img src="${s.artUrl}" style="width:38px;height:38px;border-radius:7px;object-fit:cover;flex-shrink:0;margin-right:2px;" onerror="this.remove()">` : '';
    const safe = band.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html += `
    <div class="band-row ${rowClass}">
      ${artThumb}
      <div class="band-info" onclick="openDetail('${safe}')">
        <div class="band-name">${band}</div>
        ${album}${r1}
      </div>
      <div class="checks">
        <div class="check-wrap">
          <button class="check-btn ${s.first?'c1':''}" onclick="toggle('${safe}','first')">${s.first?'✓':'○'}</button>
          <span class="check-label">1ª</span>
        </div>
        <div class="check-wrap">
          <button class="check-btn ${s.second?'c2':''}" onclick="toggle('${safe}','second')">${s.second?'✓':'○'}</button>
          <span class="check-label">2ª</span>
        </div>
        <button class="delete-btn" onclick="deleteBand('${safe}')">🗑</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;
  renderAlphaNav(filtered);
}

function renderAlphaNav(filtered) {
  const letters = [...new Set(filtered.map(b => getFirstChar(b)))];
  document.getElementById('alphNav').innerHTML = letters.map(l =>
    `<div class="alpha-btn" onclick="scrollToLetter('${l}')">${l}</div>`
  ).join('');
}

function scrollToLetter(letter) {
  const el = document.getElementById('letter-' + letter);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== ALBUM ART =====
function setArtWrap(imgUrl) {
  const wrap = document.getElementById('albumArtWrap');
  if (!imgUrl) { wrap.innerHTML = `<div class="album-art-placeholder">🎵</div>`; return; }
  const img = document.createElement('img');
  img.alt = 'Portada';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:13px;';
  img.onerror = () => { wrap.innerHTML = `<div class="album-art-placeholder">🎵</div>`; };
  img.src = imgUrl;
  wrap.innerHTML = '';
  wrap.appendChild(img);
}

function setArtLoading() {
  document.getElementById('albumArtWrap').innerHTML =
    `<div class="album-art-loading"><div class="spinner"></div><span>Buscando portada...</span></div>`;
}

function saveArt(dataUrl) {
  setArtWrap(dataUrl);
  if (currentBand) {
    if (!state[currentBand]) state[currentBand] = {};
    state[currentBand].artUrl = dataUrl;
  }
}

// Upload from device
document.getElementById('uploadArtInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    saveArt(evt.target.result);
    showToast('🖼️ Imagen cargada!');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// Auto-search via iTunes API (direct, works when hosted)
document.getElementById('searchArtBtn').addEventListener('click', async () => {
  const band = currentBand || '';
  const album = document.getElementById('detailAlbum').value.trim();
  const query = album ? `${band} ${album}` : band;
  if (!query) { showToast('⚠️ Escribe el nombre del álbum primero'); return; }
  setArtLoading();
  try {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=5&media=music`;
    const r = await fetch(url);
    if (r.ok) {
      const d = await r.json();
      if (d.results && d.results.length > 0) {
        const artUrl = d.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
        saveArt(artUrl);
        showToast('🎨 Portada encontrada!');
        return;
      }
    }
  } catch(e) {}
  setArtWrap(null);
  showToast('😕 No se encontró portada. Prueba subiendo una imagen.');
});

// ===== DETAIL MODAL =====
function openDetail(band) {
  currentBand = band;
  const s = state[band] || {};
  document.getElementById('detailTitle').textContent = band.toUpperCase();
  document.getElementById('detailAlbum').value = s.album || '';
  document.getElementById('detailLink').value = s.link || '';
  document.getElementById('detailOpinion1').value = s.opinion1 || '';
  document.getElementById('detailOpinion2').value = s.opinion2 || '';
  rating1 = s.rating1 || 0;
  rating2 = s.rating2 || 0;
  updateStars('stars1', rating1);
  updateStars('stars2', rating2);
  setArtWrap(s.artUrl || null);
  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
  currentBand = null;
}

function updateStars(containerId, val) {
  document.querySelectorAll(`#${containerId} .star`).forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.v) <= val);
  });
}

document.querySelectorAll('#stars1 .star').forEach(s => {
  s.addEventListener('click', () => {
    rating1 = parseInt(s.dataset.v);
    updateStars('stars1', rating1);
  });
});

document.querySelectorAll('#stars2 .star').forEach(s => {
  s.addEventListener('click', () => {
    rating2 = parseInt(s.dataset.v);
    updateStars('stars2', rating2);
  });
});

document.getElementById('detailSave').addEventListener('click', () => {
  if (!currentBand) return;
  if (!state[currentBand]) state[currentBand] = {};
  state[currentBand].album = document.getElementById('detailAlbum').value.trim();
  state[currentBand].link = document.getElementById('detailLink').value.trim();
  state[currentBand].opinion1 = document.getElementById('detailOpinion1').value.trim();
  state[currentBand].opinion2 = document.getElementById('detailOpinion2').value.trim();
  state[currentBand].rating1 = rating1;
  state[currentBand].rating2 = rating2;
  // artUrl is saved immediately when set via upload or search
  saveData();
  renderList();
  closeDetail();
  showToast(`💾 Guardado: ${currentBand}`);
});

});

document.getElementById('exportBtn').addEventListener('click', () => {
  const data = JSON.stringify({ bands, state, exportedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `music-tracker-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('ioModal').classList.remove('open');
  showToast('📤 Progreso exportado!');
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const d = JSON.parse(evt.target.result);
      if (!d.bands || !d.state) throw new Error('Formato inválido');
      bands = sortBands([...new Set(d.bands)]);
      state = d.state;
      saveData();
      updateStats();
      renderList();
      document.getElementById('ioModal').classList.remove('open');
      showToast('📥 Progreso importado!');
    } catch(err) {
      showToast('❌ Archivo inválido');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ===== THEME =====
document.getElementById('themeBtn').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
});

// ===== FILTERS =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderList();
  });
});

// ===== SEARCH =====
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderList();
});

// ===== INIT =====
loadData();
updateStats();
renderList();
</script>
</body>
</html>
