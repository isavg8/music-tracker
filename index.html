<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Music Tracker">
<title>🎸 Music Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f; --surface: #161618; --surface2: #1e1e22; --surface3: #252529;
  --border: #2a2a30; --border2: #35353d;
  --accent: #a855f7; --accent-dim: #7c3aed;
  --purple1: #c084fc; --purple2: #9333ea;
  --red: #ff6b6b; --gold: #ffd700;
  --text: #f0f0f0; --text-muted: #6b6b78; --text-dim: #9999a8;
  --check1-bg: #1e1228; --check1-border: #7c3aed;
  --check2-bg: #160d24; --check2-border: #9333ea;
  --modal-bg: rgba(0,0,0,0.85);
}
.light {
  --bg: #f2f2ee; --surface: #fff; --surface2: #ebebeb; --surface3: #e0e0dc;
  --border: #d5d5cc; --border2: #c0c0b8;
  --text: #111; --text-muted: #999; --text-dim: #666;
  --check1-bg: #f3e8ff; --check1-border: #9333ea;
  --check2-bg: #ede9fe; --check2-border: #7c3aed;
  --modal-bg: rgba(0,0,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; transition: background .3s, color .3s; }

/* HEADER */
.header { flex-shrink:0; background:var(--bg); border-bottom:1px solid var(--border); padding:12px 14px 0; z-index:50; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.logo { font-family:'Space Mono',monospace; font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
.logo-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.header-actions { display:flex; gap:6px; }
.icon-btn { width:34px; height:34px; border-radius:9px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:all .15s; }
.icon-btn:active { transform:scale(.9); }
.search-row { display:flex; gap:8px; margin-bottom:8px; }
.search-box { position:relative; flex:1; }
.search-box input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 12px 9px 36px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border-color .2s; }
.search-box input:focus { border-color:var(--accent); }
.search-box input::placeholder { color:var(--text-muted); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; pointer-events:none; }
.add-btn { background:var(--accent); border:none; border-radius:10px; padding:0 14px; font-family:'Space Mono',monospace; font-size:18px; font-weight:700; color:#fff; cursor:pointer; flex-shrink:0; transition:all .15s; }
.add-btn:active { transform:scale(.93); }
.filter-tabs { display:flex; gap:5px; padding-bottom:10px; overflow-x:auto; scrollbar-width:none; }
.filter-tabs::-webkit-scrollbar { display:none; }
.tab { padding:5px 12px; border-radius:18px; border:1px solid var(--border); background:transparent; color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all .15s; }
.tab.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }

/* STATS */
.stats-bar { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; background:var(--surface); border-bottom:1px solid var(--border); padding:8px 14px; }
.stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
.stat-value { font-family:'Space Mono',monospace; font-size:17px; font-weight:700; line-height:1; }
.stat-label { font-size:10px; color:var(--text-dim); }
.stat-value.acc { color:var(--accent); }
.stat-value.bl { color:#a855f7; }
.progress-bar { flex:1; height:3px; background:var(--border); border-radius:2px; margin:0 12px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),#7c3aed); border-radius:2px; transition:width .4s ease; }

/* LIST */
.list-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:80px; }
.section-letter { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; color:var(--accent); letter-spacing:2px; padding:10px 14px 3px; background:var(--bg); position:sticky; top:0; z-index:10; }

/* BAND ROW */
.band-row { display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); gap:10px; transition:background .1s; }
.band-row.has-albums { background:var(--check1-bg); }
.band-row.all-second { background:var(--check2-bg); }
.band-info { flex:1; min-width:0; cursor:pointer; }
.band-name { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.band-row.has-albums .band-name { color:var(--purple1); }
.band-row.all-second .band-name { color:var(--purple2); font-style:italic; }
.band-meta { font-size:11px; color:var(--text-muted); margin-top:2px; display:flex; align-items:center; gap:6px; }
.album-thumbs { display:flex; gap:3px; margin-top:3px; }
.album-thumb { width:28px; height:28px; border-radius:5px; object-fit:cover; flex-shrink:0; }
.album-thumb-placeholder { width:28px; height:28px; border-radius:5px; background:var(--surface3); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.band-actions { display:flex; gap:6px; flex-shrink:0; align-items:center; }
.delete-btn { width:26px; height:26px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:12px; cursor:pointer; transition:all .15s; }
.delete-btn:active { background:#ff4444; color:#fff; border-color:#ff4444; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:10px; color:var(--text-muted); }
.empty-icon { font-size:36px; }

/* ALPHA NAV */
.alpha-nav { position:fixed; right:3px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; z-index:40; }
.alpha-btn { font-family:'Space Mono',monospace; font-size:8px; color:var(--text-muted); cursor:pointer; padding:1px 3px; border-radius:3px; line-height:1.5; transition:all .1s; }
.alpha-btn:active { background:var(--accent); color:#fff; }

/* FLOATING */
.floating-count { position:fixed; bottom:18px; right:14px; background:var(--accent); color:#fff; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; padding:7px 13px; border-radius:18px; box-shadow:0 4px 20px rgba(0,0,0,.4); z-index:200; pointer-events:none; }

/* TOAST */
.toast { position:fixed; bottom:55px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--surface3); border:1px solid var(--border2); color:var(--text); padding:9px 18px; border-radius:18px; font-size:12px; font-weight:500; opacity:0; transition:all .25s; pointer-events:none; z-index:500; white-space:nowrap; max-width:90vw; overflow:hidden; text-overflow:ellipsis; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* MODAL BASE */
.modal-overlay { position:fixed; inset:0; background:var(--modal-bg); z-index:1000; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { width:100%; background:var(--surface); border-radius:20px 20px 0 0; padding:0 0 30px; max-height:92vh; overflow-y:auto; transform:translateY(40px); transition:transform .3s cubic-bezier(.32,1.1,.72,1); }
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:12px auto 0; }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 12px; border-bottom:1px solid var(--border); }
.modal-title { font-family:'Space Mono',monospace; font-size:14px; font-weight:700; color:var(--accent); }
.modal-close { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }
.modal-body { padding:16px 18px; }

/* BAND ALBUMS VIEW */
.albums-list { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
.album-card { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:12px; display:flex; gap:12px; align-items:flex-start; cursor:pointer; transition:border-color .15s; }
.album-card:active { border-color:var(--accent); }
.album-card-art { width:56px; height:56px; border-radius:9px; object-fit:cover; flex-shrink:0; background:var(--surface3); display:flex; align-items:center; justify-content:center; font-size:22px; }
.album-card-art img { width:56px; height:56px; border-radius:9px; object-fit:cover; }
.album-card-info { flex:1; min-width:0; }
.album-card-name { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.album-card-checks { display:flex; gap:8px; margin-top:6px; align-items:center; }
.mini-check { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-muted); }
.mini-dot { width:10px; height:10px; border-radius:3px; border:1.5px solid var(--border2); background:var(--surface3); }
.mini-dot.c1 { background:var(--check1-bg); border-color:var(--check1-border); }
.mini-dot.c2 { background:var(--check2-bg); border-color:var(--check2-border); }
.mini-stars { font-size:10px; color:var(--gold); margin-left:4px; }
.album-card-delete { width:24px; height:24px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; flex-shrink:0; }
.album-card-delete:active { background:#ff4444; color:#fff; border-color:#ff4444; }
.add-album-btn { width:100%; padding:12px; border-radius:12px; border:1.5px dashed var(--border2); background:transparent; color:var(--accent); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.add-album-btn:active { background:var(--check1-bg); }

/* ALBUM EDIT FORM */
.back-btn { display:flex; align-items:center; gap:6px; background:none; border:none; color:var(--accent); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; padding:0; margin-bottom:14px; }
.field-group { margin-bottom:14px; }
.field-label { font-size:11px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; display:block; }
.field-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border-color .2s; resize:none; }
.field-input:focus { border-color:var(--accent); }
.field-input::placeholder { color:var(--text-muted); }
textarea.field-input { min-height:70px; }
.section-divider { display:flex; align-items:center; gap:10px; margin:16px 0 12px; }
.divider-label { font-family:'Space Mono',monospace; font-size:10px; font-weight:700; color:var(--accent); letter-spacing:1px; white-space:nowrap; }
.divider-line { flex:1; height:1px; background:var(--border); }
.star-rating { display:flex; gap:6px; margin-top:4px; }
.star { font-size:26px; cursor:pointer; transition:transform .1s; filter:grayscale(1) opacity(.3); user-select:none; }
.star.active { filter:none; }
.star:active { transform:scale(1.3); }
.save-btn { width:100%; background:var(--accent); border:none; border-radius:12px; padding:14px; font-family:'Space Mono',monospace; font-size:14px; font-weight:700; color:#fff; cursor:pointer; margin-top:18px; transition:all .15s; }
.save-btn:active { transform:scale(.97); }
.album-art-wrap { width:100%; margin-bottom:14px; border-radius:14px; overflow:hidden; background:var(--surface2); border:1px solid var(--border); max-height:220px; aspect-ratio:1; display:flex; align-items:center; justify-content:center; }
.album-art-wrap img { width:100%; height:100%; object-fit:cover; display:block; border-radius:13px; }
.album-art-placeholder { font-size:52px; opacity:.3; }
.album-art-loading { font-size:13px; color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:8px; }
.spinner { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.art-btns { display:flex; gap:8px; margin-bottom:14px; }
.art-btn { flex:1; padding:9px 6px; border-radius:9px; border:1px solid var(--border2); background:var(--surface3); color:var(--text-dim); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:all .15s; }
.art-btn:active { background:var(--check1-bg); border-color:var(--accent); color:var(--accent); }

/* ADD MODAL */
.add-input { width:100%; background:var(--surface2); border:1.5px solid var(--accent); border-radius:12px; padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:16px; color:var(--text); outline:none; }
.add-input::placeholder { color:var(--text-muted); }

/* IO MODAL */
.io-btn { width:100%; padding:13px; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; border:1.5px solid var(--border); background:var(--surface2); color:var(--text); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.io-btn:active { transform:scale(.97); }
.io-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
.io-btn-icon { font-size:18px; }
.io-note { font-size:11px; color:var(--text-muted); text-align:center; margin-top:4px; line-height:1.5; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo"><div class="logo-dot"></div>MUSIC TRACKER</div>
    <div class="header-actions">
      <button class="icon-btn" id="ioBtn">💾</button>
      <button class="icon-btn" id="themeBtn">🌙</button>
    </div>
  </div>
  <div class="search-row">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar banda..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="add-btn" id="addBandBtn">+</button>
  </div>
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">Todas</button>
    <button class="tab" data-filter="pending">Sin álbumes</button>
    <button class="tab" data-filter="first">1ª escucha ✓</button>
    <button class="tab" data-filter="second">2ª escucha ✓</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><span class="stat-value" id="totalCount">0</span><span class="stat-label">bandas</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="stat"><span class="stat-value acc" id="albumCount">0</span><span class="stat-label">álbumes</span></div>
  <div class="stat" style="margin-left:10px"><span class="stat-value bl" id="secondCount">0</span><span class="stat-label">2ª esc.</span></div>
</div>

<div class="list-scroll"><div id="listContainer"></div></div>
<div class="alpha-nav" id="alphNav"></div>
<div class="floating-count" id="floatingCount">0 bandas</div>
<div class="toast" id="toast"></div>

<!-- BAND MODAL (shows album list) -->
<div class="modal-overlay" id="bandModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="bandModalTitle">BANDA</span>
      <button class="modal-close" id="bandModalClose">✕</button>
    </div>
    <div class="modal-body" id="bandModalBody"></div>
  </div>
</div>

<!-- ALBUM MODAL (edit single album) -->
<div class="modal-overlay" id="albumModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="albumModalTitle">ÁLBUM</span>
      <button class="modal-close" id="albumModalClose">✕</button>
    </div>
    <div class="modal-body" id="albumModalBody"></div>
  </div>
</div>

<!-- ADD BAND MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><span class="modal-title">AGREGAR BANDA</span><button class="modal-close" id="addClose">✕</button></div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">🎸 Nombre de la banda o músico</label>
        <input type="text" class="add-input" id="addInput" placeholder="Ej: Opeth, Kendrick Lamar...">
      </div>
      <button class="save-btn" id="addSave">AGREGAR</button>
    </div>
  </div>
</div>

<!-- IO MODAL -->
<div class="modal-overlay" id="ioModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><span class="modal-title">GUARDAR / CARGAR</span><button class="modal-close" id="ioClose">✕</button></div>
    <div class="modal-body">
      <button class="io-btn primary" id="exportBtn"><span class="io-btn-icon">📤</span><div><div>Exportar progreso</div><div style="font-size:11px;font-weight:400;margin-top:2px">Descarga un archivo .json con todo tu progreso</div></div></button>
      <button class="io-btn" id="importBtn"><span class="io-btn-icon">📥</span><div><div>Importar progreso</div><div style="font-size:11px;font-weight:400;margin-top:2px">Carga un archivo .json guardado anteriormente</div></div></button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <div class="io-note">💡 Exporta regularmente para no perder tu progreso.</div>
    </div>
  </div>
</div>

const STORAGE_KEY = 'music_tracker_v3';
let bands = [], state = {}, currentFilter = 'all', searchQuery = '', isDark = true;
let currentBand = null, currentAlbumId = null, artRating1 = 0, artRating2 = 0, pendingArt = null;

// ===== HELPERS =====
function normSort(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/^ñ/,'n~').replace(/ñ/g,'n~'); }
function sortBands(arr) { return [...arr].sort((a,b) => normSort(a).localeCompare(normSort(b),'es')); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function starsHTML(r) { return r ? '★'.repeat(r)+'☆'.repeat(5-r) : ''; }
function getFirstChar(b) {
  const c = b[0];
  if (/[0-9]/.test(c)) return '#';
  const n = c.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (n.toLowerCase()==='n' && b[0].toLowerCase()==='ñ') return 'Ñ';
  return n.toUpperCase();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== DATA =====
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); bands = d.bands||[...DEFAULT_BANDS]; state = d.state||{}; }
    else { bands = [...DEFAULT_BANDS]; state = {}; }
  } catch(e) { bands = [...DEFAULT_BANDS]; state = {}; }
  bands = sortBands([...new Set(bands)]);
  // Migrate old format (v2 → v3)
  for (const b of bands) {
    if (state[b] && !state[b].albums) {
      const old = state[b];
      if (old.album || old.first || old.second) {
        state[b] = { albums: [{ id: uid(), name: old.album||'', link: old.link||'', artUrl: old.artUrl||'', first: !!old.first, second: !!old.second, rating1: old.rating1||0, rating2: old.rating2||0, opinion1: old.opinion1||'', opinion2: old.opinion2||'' }] };
      } else { state[b] = { albums: [] }; }
    }
  }
}
function saveData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({bands,state})); } catch(e){} }
function getBandAlbums(band) { return state[band]?.albums || []; }

// ===== STATS =====
function getBandStatus(band) {
  const albums = getBandAlbums(band);
  if (!albums.length) return 'pending';
  if (albums.some(a => a.second)) return 'second';
  if (albums.some(a => a.first)) return 'first';
  return 'pending';
}

function updateStats() {
  const total = bands.length;
  const totalAlbums = bands.reduce((n,b) => n + getBandAlbums(b).length, 0);
  const secondCount = bands.reduce((n,b) => n + getBandAlbums(b).filter(a=>a.second).length, 0);
  const withFirst = bands.filter(b => getBandAlbums(b).some(a=>a.first)).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('albumCount').textContent = totalAlbums;
  document.getElementById('secondCount').textContent = secondCount;
  document.getElementById('progressFill').style.width = (total ? withFirst/total*100 : 0) + '%';
}

// ===== MAIN LIST =====
function getFiltered() {
  let list = bands;
  if (searchQuery) { const q=searchQuery.toLowerCase(); list=list.filter(b=>b.toLowerCase().includes(q)); }
  if (currentFilter==='pending') list=list.filter(b=>getBandStatus(b)==='pending');
  else if (currentFilter==='first') list=list.filter(b=>getBandAlbums(b).some(a=>a.first));
  else if (currentFilter==='second') list=list.filter(b=>getBandAlbums(b).some(a=>a.second));
  return list;
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('floatingCount').textContent = filtered.length + ' bandas';
  const container = document.getElementById('listContainer');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎸</div><div style="font-size:14px;color:var(--text-muted)">No se encontraron bandas</div></div>`;
    renderAlphaNav([]); return;
  }
  let html = '', lastLetter = '';
  filtered.forEach(band => {
    const letter = getFirstChar(band);
    if (letter !== lastLetter) { html += `<div class="section-letter" id="letter-${letter}">${letter}</div>`; lastLetter = letter; }
    const albums = getBandAlbums(band);
    const status = getBandStatus(band);
    const rowClass = albums.some(a=>a.second) ? 'all-second' : albums.length ? 'has-albums' : '';
    const safe = band.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const albumCount = albums.length ? `<span>${albums.length} álbum${albums.length>1?'es':''}</span>` : '<span style="color:var(--text-muted)">Sin álbumes</span>';
    const thumbs = albums.slice(0,4).map(a => a.artUrl
      ? `<img class="album-thumb" src="${a.artUrl}" onerror="this.remove()">`
      : `<div class="album-thumb-placeholder">💿</div>`
    ).join('');
    html += `
    <div class="band-row ${rowClass}">
      <div class="band-info" onclick="openBandModal('${safe}')">
        <div class="band-name">${band}</div>
        <div class="band-meta">${albumCount}</div>
        ${albums.length ? `<div class="album-thumbs">${thumbs}</div>` : ''}
      </div>
      <div class="band-actions">
        <button class="delete-btn" onclick="event.stopPropagation();deleteBand('${safe}')">🗑</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;
  renderAlphaNav(filtered);
}

function renderAlphaNav(filtered) {
  const letters = [...new Set(filtered.map(b=>getFirstChar(b)))];
  document.getElementById('alphNav').innerHTML = letters.map(l=>`<div class="alpha-btn" onclick="scrollToLetter('${l}')">${l}</div>`).join('');
}
function scrollToLetter(l) { document.getElementById('letter-'+l)?.scrollIntoView({behavior:'smooth',block:'start'}); }

function deleteBand(band) {
  if (!confirm(`¿Eliminar "${band}"?`)) return;
  bands = bands.filter(b=>b!==band); delete state[band];
  saveData(); updateStats(); renderList();
  showToast(`🗑 Eliminado: ${band}`);
}

// ===== BAND MODAL (album list) =====
function openBandModal(band) {
  currentBand = band;
  document.getElementById('bandModalTitle').textContent = band.toUpperCase();
  renderBandModalBody();
  document.getElementById('bandModal').classList.add('open');
}

function renderBandModalBody() {
  const albums = getBandAlbums(currentBand);
  let html = '<div class="albums-list">';
  if (!albums.length) {
    html += `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:14px">Aún no has agregado álbumes 🎵</div>`;
  }
  albums.forEach(album => {
    const safe = album.id;
    const artHTML = album.artUrl
      ? `<div class="album-card-art"><img src="${album.artUrl}" onerror="this.parentElement.innerHTML='💿'"></div>`
      : `<div class="album-card-art">💿</div>`;
    const c1 = album.first ? 'c1' : '';
    const c2 = album.second ? 'c2' : '';
    const stars = album.rating1 ? `<span class="mini-stars">${starsHTML(album.rating1)}</span>` : '';
    html += `
    <div class="album-card" onclick="openAlbumModal('${safe}')">
      ${artHTML}
      <div class="album-card-info">
        <div class="album-card-name">${album.name || 'Sin nombre'}</div>
        <div class="album-card-checks">
          <div class="mini-check"><div class="mini-dot ${c1}"></div> 1ª</div>
          <div class="mini-check"><div class="mini-dot ${c2}"></div> 2ª</div>
          ${stars}
        </div>
      </div>
      <button class="album-card-delete" onclick="event.stopPropagation();deleteAlbum('${safe}')">🗑</button>
    </div>`;
  });
  html += '</div>';
  html += `<button class="add-album-btn" onclick="openAlbumModal(null)">+ Agregar álbum</button>`;
  document.getElementById('bandModalBody').innerHTML = html;
}

function deleteAlbum(albumId) {
  if (!confirm('¿Eliminar este álbum?')) return;
  if (!state[currentBand]) return;
  state[currentBand].albums = state[currentBand].albums.filter(a=>a.id!==albumId);
  saveData(); updateStats(); renderList(); renderBandModalBody();
  showToast('🗑 Álbum eliminado');
}

function openAlbumModal(albumId) {
  currentAlbumId = albumId;

  artRating1 = album?.rating1 || 0;
  artRating2 = album?.rating2 || 0;
  renderAlbumModalBody(album);
  document.getElementById('albumModal').classList.add('open');
}

    } catch(e) {}
    setArtWrap(null); showToast('😕 No se encontró portada');
  });

  // Save
  body.querySelector('#saveAlbumBtn').addEventListener('click', () => {
    if (!state[currentBand]) state[currentBand] = { albums: [] };
    const albums = state[currentBand].albums;
    const check1 = body.querySelector('#check1').checked;
    const check2 = body.querySelector('#check2').checked;
    const data = {
      id: currentAlbumId || uid(),
      name: body.querySelector('#albumName').value.trim(),
      link: body.querySelector('#albumLink').value.trim(),
      artUrl: pendingArt || (currentAlbumId ? albums.find(a=>a.id===currentAlbumId)?.artUrl : '') || '',
      first: check1,
      second: check2 ? true : check1 ? check1 : false,
      rating1: artRating1,
      rating2: artRating2,
      opinion1: body.querySelector('#opinion1').value.trim(),
      opinion2: body.querySelector('#opinion2').value.trim(),
    };
    if (check2) data.first = true;
    if (currentAlbumId) {
      const idx = albums.findIndex(a=>a.id===currentAlbumId);
      if (idx>=0) albums[idx] = data;
    } else {
      albums.push(data);
    }
    saveData(); updateStats(); renderList();
    document.getElementById('albumModal').classList.remove('open');
    renderBandModalBody();
    showToast(`💾 Guardado!`);
  });
}

function setArtWrap(url) {
  const wrap = document.getElementById('artWrap');
  if (!wrap) return;
  if (!url) { wrap.innerHTML = `<div class="album-art-placeholder">🎵</div>`; return; }
  const img = document.createElement('img');
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:13px;';
  img.onerror = () => { wrap.innerHTML = `<div class="album-art-placeholder">🎵</div>`; };
  img.src = url; wrap.innerHTML = ''; wrap.appendChild(img);
}
function setArtLoading() {
  const wrap = document.getElementById('artWrap');
  if (wrap) wrap.innerHTML = `<div class="album-art-loading"><div class="spinner"></div><span>Buscando...</span></div>`;
}
function updateStars(id, val) {
  document.querySelectorAll(`#${id} .star`).forEach(s => s.classList.toggle('active', parseInt(s.dataset.v)<=val));
}

async function urlToBase64(imgUrl) {
  try {
    const r = await fetch(`https://wsrv.nl/?url=${encodeURIComponent(imgUrl)}&w=600&h=600&fit=cover&output=jpg`);
    if (!r.ok) throw new Error();
    const blob = await r.blob();
    return await new Promise((res,rej) => { const rd=new FileReader(); rd.onload=()=>res(rd.result); rd.onerror=rej; rd.readAsDataURL(blob); });
  } catch(e) { return null; }
}

// ===== BAND MODAL CLOSE =====
document.getElementById('bandModalClose').addEventListener('click', () => {
  document.getElementById('bandModal').classList.remove('open');
});
document.getElementById('bandModal').addEventListener('click', e => {
  if (e.target === document.getElementById('bandModal')) document.getElementById('bandModal').classList.remove('open');
});

// ===== ALBUM MODAL CLOSE =====
document.getElementById('albumModalClose').addEventListener('click', () => {
  document.getElementById('albumModal').classList.remove('open');
});
document.getElementById('albumModal').addEventListener('click', e => {
  if (e.target === document.getElementById('albumModal')) document.getElementById('albumModal').classList.remove('open');
});

// ===== ADD BAND =====
document.getElementById('addBandBtn').addEventListener('click', () => {
  document.getElementById('addInput').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('addInput').focus(), 300);
});
document.getElementById('addClose').addEventListener('click', () => document.getElementById('addModal').classList.remove('open'));
document.getElementById('addModal').addEventListener('click', e => { if(e.target===document.getElementById('addModal')) document.getElementById('addModal').classList.remove('open'); });
document.getElementById('addSave').addEventListener('click', () => {
  const val = document.getElementById('addInput').value.trim();
  if (!val) return;
  if (bands.find(b=>b.toLowerCase()===val.toLowerCase())) { showToast('⚠️ Esa banda ya está en la lista'); return; }
  bands.push(val); bands = sortBands(bands);
  saveData(); updateStats(); renderList();
  document.getElementById('addModal').classList.remove('open');
  showToast(`✅ Agregado: ${val}`);
});
document.getElementById('addInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('addSave').click(); });

// ===== FILTERS & SEARCH =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active'); currentFilter = tab.dataset.filter; renderList();
  });
});
document.getElementById('searchInput').addEventListener('input', e => { searchQuery=e.target.value.trim(); renderList(); });

// ===== THEME =====
document.getElementById('themeBtn').addEventListener('click', () => {
  isDark=!isDark; document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent = isDark?'🌙':'☀️';
});

// ===== IO =====
document.getElementById('ioBtn').addEventListener('click', () => document.getElementById('ioModal').classList.add('open'));
document.getElementById('ioClose').addEventListener('click', () => document.getElementById('ioModal').classList.remove('open'));
document.getElementById('ioModal').addEventListener('click', e => { if(e.target===document.getElementById('ioModal')) document.getElementById('ioModal').classList.remove('open'); });
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = JSON.stringify({bands,state,exportedAt:new Date().toISOString()},null,2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download = `music-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  document.getElementById('ioModal').classList.remove('open');
  showToast('📤 Progreso exportado!');
});
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const d = JSON.parse(evt.target.result);
      if (!d.bands||!d.state) throw new Error();
      bands=sortBands([...new Set(d.bands)]); state=d.state;
      saveData(); updateStats(); renderList();
      document.getElementById('ioModal').classList.remove('open');
      showToast('📥 Progreso importado!');
    } catch(e) { showToast('❌ Archivo inválido'); }
    e.target.value='';
  };
  reader.readAsText(file);
});

// ===== INIT =====
loadData(); updateStats(); renderList();
</script>
