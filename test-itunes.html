<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>iTunes API Test</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #111; color: #eee; }
  button { background: #a855f7; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; }
  img { width: 200px; height: 200px; border-radius: 10px; margin-top: 10px; display: block; }
  .status { margin: 6px 0; font-size: 13px; }
  .ok { color: #a8e063; } .err { color: #ff6b6b; } .warn { color: #ffd700; }
</style>
</head>
<body>
<h2>🧪 iTunes + CORS Proxy Test</h2>
<p>Testing: <strong>Agalloch — The Mantle</strong></p>
<button onclick="runTest()">Run Test</button>
<div id="out"></div>
<script>
async function runTest() {
  const out = document.getElementById('out');
  out.innerHTML = '<p class="status">⏳ Fetching from iTunes directly...</p>';
  try {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent('agalloch the mantle')}&entity=album&limit=5&media=music`;
    const r = await fetch(url);
    out.innerHTML += `<p class="status ${r.ok?'ok':'err'}">HTTP: ${r.status}</p>`;
    const d = await r.json();
    out.innerHTML += `<p class="status ok">Results: ${d.resultCount}</p>`;
    if (d.results?.length > 0) {
      const raw = d.results[0].artworkUrl100;
      out.innerHTML += `<p class="status warn">Raw artworkUrl100: <code>${raw}</code></p>`;
      // Try multiple replacements
      const attempts = [
        raw.replace('100x100bb', '600x600bb'),
        raw.replace('100x100bb.jpg', '600x600bb.jpg'),
        raw.replace(/\/\d+x\d+bb/, '/600x600bb'),
        raw,
      ];
      for (const url of [...new Set(attempts)]) {
        out.innerHTML += `<p class="status warn">Trying: <code>${url}</code></p>`;
        out.innerHTML += `<img src="${url}" style="width:150px;height:150px;border-radius:8px;object-fit:cover;display:block;margin:4px 0" 
          onload="this.previousSibling.className='status ok'" 
          onerror="this.previousSibling.className='status err';this.remove()">`;
      }
    } else {
      out.innerHTML += `<p class="status err">No results found</p>`;
    }
  } catch(e) {
    out.innerHTML += `<p class="status err">❌ ${e.message}</p>`;
  }
}
</script>
</body>
</html>
